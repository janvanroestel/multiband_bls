name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the mypy target (python_version = "3.9"): a newer interpreter
          # pulls a numpy whose type stubs use 3.12-only `type` statements, which
          # mypy cannot parse under a 3.9 target.
          python-version: "3.9"

      - name: Install package and lint tools
        run: pip install -e ".[test]" ruff mypy

      - name: Ruff
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/multiband_bls/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v
